# =============================================================================
# CEGU pSEO — Nginx produksi (PHP-FPM) dengan MICRO-CACHE full-page
# =============================================================================
# Micro-cache = senjata utama untuk skala jutaan halaman yang digempur crawler:
# render PHP hanya sekali per beberapa detik/menit per URL, sisanya dilayani
# dari cache Nginx (super ringan). Halaman pSEO stabil, jadi TTL pendek aman.
#
# Pasang: /etc/nginx/sites-available/cegu → symlink ke sites-enabled.
# Ganti: server_name, root, dan socket PHP-FPM sesuai server Anda.
# =============================================================================

# Zona cache (letakkan di http{} — bisa juga di /etc/nginx/conf.d/cegu-cache.conf)
fastcgi_cache_path /var/cache/nginx/cegu levels=1:2 keys_zone=CEGU:100m inactive=60m max_size=5g;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

server {
    listen 80;
    server_name contoh.com www.contoh.com;
    root /var/www/cegu/public;
    index index.php;

    # --- Kompresi ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # --- Aset statis: cache panjang di browser/CDN ---
    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Tentukan kapan micro-cache BOLEH dipakai ---
    set $no_cache 0;
    if ($request_method != GET)            { set $no_cache 1; }   # hanya GET
    if ($request_uri ~* "^/admin")         { set $no_cache 1; }   # panel admin
    if ($request_uri ~* "^/login")         { set $no_cache 1; }
    if ($request_uri ~* "^/track/")        { set $no_cache 1; }   # beacon lead
    if ($http_cookie ~* "cegu_session")    { set $no_cache 1; }   # user login

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;   # sesuaikan versi/soket

        # --- MICRO-CACHE ---
        fastcgi_cache CEGU;
        fastcgi_cache_valid 200 301 302 5m;   # halaman & redirect: 5 menit
        fastcgi_cache_valid 404 410 1m;       # not-found/gone: 1 menit
        fastcgi_cache_bypass $no_cache;
        fastcgi_cache_no_cache $no_cache;
        fastcgi_cache_lock on;                # cegah "cache stampede" saat miss
        add_header X-Cache $upstream_cache_status;   # HIT/MISS untuk debugging
        fastcgi_read_timeout 1800;            # cukup untuk halaman/proses berat
    }

    # Jangan layani file tersembunyi.
    location ~ /\.(?!well-known).* { deny all; }
}

# =============================================================================
# Setelah dipasang:
#   sudo mkdir -p /var/cache/nginx/cegu && sudo chown www-data: /var/cache/nginx/cegu
#   sudo nginx -t && sudo systemctl reload nginx
#
# Purge cache saat publish besar / ganti template:
#   sudo rm -rf /var/cache/nginx/cegu/* && sudo systemctl reload nginx
# (atau kecilkan TTL bila butuh perubahan tampil lebih cepat.)
# =============================================================================
