# =============================================================================
# CEGU pSEO — Tuning Redis (cache + queue)
# =============================================================================
# Tambahkan/ubah di /etc/redis/redis.conf lalu: sudo systemctl restart redis
#
# Kunci untuk skala jutaan: batasi memori & pakai kebijakan LRU agar cache lama
# otomatis dibuang — Redis tidak akan kehabisan RAM.
# =============================================================================

# Batas memori (sesuaikan dengan RAM server; sisakan untuk PHP-FPM & DB).
maxmemory 2gb

# allkeys-lru: buang key paling jarang dipakai saat penuh. Cocok untuk cache
# render halaman. CATATAN: bila cache & queue berbagi satu Redis, key antrian
# bisa ikut terbuang saat penuh. Untuk aman, pisahkan DB (lihat .env: cache pakai
# REDIS_CACHE_DB, queue pakai DB lain) atau gunakan instance Redis terpisah.
maxmemory-policy allkeys-lru

# Persistensi ringan (cache boleh hilang saat restart; queue sebaiknya persist).
save 900 1
appendonly no

# =============================================================================
# Rekomendasi pemisahan (opsional tapi disarankan di produksi besar):
#   - Redis DB 1  → cache   (boleh LRU-evict)
#   - Redis DB 0  → queue   (JANGAN evict; pakai instance/DB berbeda bila bisa)
# Atur via .env: REDIS_CACHE_DB=1, REDIS_DB=0
# =============================================================================
