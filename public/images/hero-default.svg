<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" role="img" aria-label="Ilustrasi belajar bersama tutor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f4ec"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" rx="20" fill="url(#bg)"/>

  <circle cx="402" cy="70" r="58" fill="#f2c300" opacity="0.22"/>
  <circle cx="74" cy="300" r="46" fill="#045323" opacity="0.10"/>

  <!-- Open book -->
  <g transform="translate(120 196)">
    <path d="M0 18 C40 0 80 0 120 14 L120 132 C80 118 40 118 0 136 Z" fill="#ffffff" stroke="#cfe0d4" stroke-width="2"/>
    <path d="M240 18 C200 0 160 0 120 14 L120 132 C160 118 200 118 240 136 Z" fill="#ffffff" stroke="#cfe0d4" stroke-width="2"/>
    <rect x="115" y="12" width="10" height="124" rx="3" fill="#045323"/>
    <g stroke="#9fbfab" stroke-width="5" stroke-linecap="round">
      <line x1="22" y1="40" x2="98" y2="34"/>
      <line x1="22" y1="60" x2="98" y2="54"/>
      <line x1="22" y1="80" x2="98" y2="74"/>
      <line x1="142" y1="34" x2="218" y2="40"/>
      <line x1="142" y1="54" x2="218" y2="60"/>
      <line x1="142" y1="74" x2="218" y2="80"/>
    </g>
  </g>

  <!-- Graduation cap -->
  <g transform="translate(240 96)">
    <path d="M0 18 L74 0 L148 18 L74 36 Z" fill="#045323"/>
    <path d="M30 28 L30 58 C30 74 118 74 118 58 L118 28 L74 40 Z" fill="#0a6e35"/>
    <line x1="148" y1="18" x2="148" y2="58" stroke="#013616" stroke-width="4" stroke-linecap="round"/>
    <circle cx="148" cy="62" r="7" fill="#f2c300"/>
  </g>

  <!-- Pencil -->
  <g transform="rotate(38 96 250)">
    <rect x="44" y="244" width="120" height="20" rx="4" fill="#f2c300"/>
    <rect x="150" y="244" width="22" height="20" fill="#e6b800"/>
    <path d="M172 244 L196 254 L172 264 Z" fill="#3a2c00"/>
    <rect x="36" y="244" width="10" height="20" rx="3" fill="#d85a30"/>
  </g>

  <!-- Sparkles -->
  <g fill="#f2c300">
    <path d="M360 168 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z"/>
    <path d="M96 120 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4 z"/>
  </g>

  <!-- Checklist badge -->
  <g transform="translate(330 232)">
    <rect width="118" height="86" rx="14" fill="#ffffff" stroke="#cfe0d4" stroke-width="2"/>
    <g>
      <circle cx="24" cy="26" r="10" fill="#045323"/><path d="M19 26 l4 4 7 -8" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="42" y="22" width="58" height="8" rx="4" fill="#dbe7df"/>
      <circle cx="24" cy="60" r="10" fill="#045323"/><path d="M19 60 l4 4 7 -8" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="42" y="56" width="48" height="8" rx="4" fill="#dbe7df"/>
    </g>
  </g>
</svg>
